name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependencias
        run: npm install

      - name: Añadir plataforma Android
        run: npx cap add android

      - name: Ajustar AndroidManifest (streams http + servicio en primer plano)
        run: |
          M=android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<application android:usesCleartextTraffic="true"|' $M
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/><uses-permission android:name="android.permission.WAKE_LOCK"/></manifest>|' $M
          sed -i 's|</application>|<receiver android:name="io.capawesome.capacitorjs.plugins.foregroundservice.NotificationActionBroadcastReceiver"/><service android:name="io.capawesome.capacitorjs.plugins.foregroundservice.AndroidForegroundService" android:foregroundServiceType="mediaPlayback"/></application>|' $M
          cat $M

      - name: Copiar icono de notificación
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp resources/ic_stat_sintonia.png android/app/src/main/res/drawable/

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Decodificar keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Compilar APK (release sin firmar)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Alinear y firmar APK
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          $BUILD_TOOLS/zipalign -p 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            sintonia-aligned.apk
          $BUILD_TOOLS/apksigner sign \
            --ks android/app/keystore.jks \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out SINTONIA.apk \
            sintonia-aligned.apk
          $BUILD_TOOLS/apksigner verify --print-certs SINTONIA.apk

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: SINTONIA-apk
          path: SINTONIA.apk
